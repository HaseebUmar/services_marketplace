<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Marketplace | Home</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/customer.css">
</head>
<body>

<nav class="navbar">
    <div class="navbar__logo">ServiceHub</div>
    <div class="navbar__links">
        <a href="#" class="btn btn--primary">Login</a>
        <a href="#" class="btn btn--outline">Register</a>
    </div>
</nav>

<header class="hero-section">

    <p>Browse through local and online services offered by experts.</p>
</header>

<main class="container">
    <h2 class="section-title">Available Services</h2>

    <div class="services-grid">

        <!-- Static demo card -->
        <div class="service-card">
            <div class="service-card__image-wrapper">
                <img src="uploads/sample.jpg" class="service-card__img">
                <span class="badge badge--local">Local</span>
            </div>

            <div class="service-card__content">
                <h3>Web Development</h3>
                <p>By: John</p>
                <p>$100</p>
            </div>
        </div>

    </div>
